<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Ahel 💗</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap');

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
overflow:hidden;
background:linear-gradient(135deg,#ff1493,#ff69b4,#ffc0cb);
display:flex;
justify-content:center;
align-items:center;
perspective:1200px;
}

/* Background Blur Glow */
body::before{
content:'';
position:absolute;
width:500px;
height:500px;
background:#fff;
filter:blur(180px);
opacity:.18;
border-radius:50%;
animation:moveGlow 8s infinite alternate;
}

@keyframes moveGlow{
0%{transform:translate(-200px,-100px);}
100%{transform:translate(200px,100px);}
}

/* Floating Hearts */
.heart{
position:absolute;
bottom:-50px;
font-size:24px;
color:#fff;
animation:floatHeart linear infinite;
opacity:.7;
}

@keyframes floatHeart{
0%{
transform:translateY(0) rotate(0deg);
opacity:0;
}
20%{opacity:1;}
100%{
transform:translateY(-110vh) rotate(360deg);
opacity:0;
}
}

/* Main Card */
.card{
width:380px;
padding:35px;
border-radius:30px;
background:rgba(255,255,255,0.12);
backdrop-filter:blur(18px);
box-shadow:
0 0 25px rgba(255,255,255,.2),
0 0 60px rgba(255,20,147,.45);
text-align:center;
transform-style:preserve-3d;
animation:floatCard 5s ease-in-out infinite;
}

@keyframes floatCard{
0%,100%{transform:rotateY(-8deg) rotateX(4deg) translateY(0);}
50%{transform:rotateY(8deg) rotateX(-4deg) translateY(-15px);}
}

.title{
font-size:42px;
font-weight:700;
color:white;
text-shadow:0 0 15px #fff;
margin-bottom:8px;
}

.sub{
color:#fff;
font-size:15px;
opacity:.9;
margin-bottom:25px;
}

/* Profile */
.profile-wrap{
width:190px;
height:190px;
margin:auto;
border-radius:50%;
padding:5px;
background:conic-gradient(#fff,#ff1493,#fff,#ff69b4,#fff);
animation:spin 4s linear infinite;
box-shadow:0 0 35px #ff1493;
}

@keyframes spin{
100%{transform:rotate(360deg);}
}

.profile{
width:100%;
height:100%;
border-radius:50%;
overflow:hidden;
border:4px solid white;
}

.profile img{
width:100%;
height:100%;
object-fit:cover;
}

/* Button */
button{
margin-top:30px;
padding:16px 45px;
border:none;
border-radius:50px;
font-size:18px;
font-weight:600;
color:white;
cursor:pointer;
background:linear-gradient(90deg,#ff1493,#ff69b4);
box-shadow:0 0 25px #ff1493;
transition:.3s;
}

button:hover{
transform:scale(1.08);
box-shadow:0 0 40px #fff;
}

/* Popup */
.popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(0);
background:rgba(255,255,255,.18);
backdrop-filter:blur(20px);
padding:35px;
border-radius:25px;
width:90%;
max-width:420px;
text-align:center;
color:white;
box-shadow:0 0 45px #ff1493;
transition:.5s;
z-index:99;
}

.popup.show{
transform:translate(-50%,-50%) scale(1);
}

.popup h2{
font-size:34px;
margin-bottom:12px;
}

.popup p{
font-size:18px;
line-height:1.7;
}

.close{
margin-top:20px;
background:white;
color:#ff1493;
}

/* sparkle */
.spark{
position:absolute;
width:6px;
height:6px;
background:white;
border-radius:50%;
animation:sparkle 2s linear infinite;
}

@keyframes sparkle{
0%{transform:scale(0);}
50%{transform:scale(1);}
100%{transform:scale(0);}
}

</style>
</head>
<body>

<div class="card">
<div class="title">AHEL 💗</div>
<div class="sub">The Queen Of My Heart</div>

<div class="profile-wrap">
<div class="profile">
<img src="https://images.unsplash.com/photo-1517841905240-472988babdf9?w=600" alt="">
</div>
</div>

<button onclick="openLove()">Open My Heart 💌</button>
</div>

<div class="popup" id="popup">
<h2>I Love You 💗</h2>
<p>
Hai Ahel...<br><br>
Kalau dunia penuh pilihan,<br>
aku tetap pilih kamu.<br><br>
Kalau hati punya rumah,<br>
nama kamu ada di dalamnya.<br><br>
Aku sayang kamu selalu.
</p>
<button class="close" onclick="closeLove()">Close</button>
</div>

<script>
function openLove(){
document.getElementById("popup").classList.add("show");
}

function closeLove(){
document.getElementById("popup").classList.remove("show");
}

/* Floating hearts */
for(let i=0;i<25;i++){
let h=document.createElement("div");
h.className="heart";
h.innerHTML="💗";
h.style.left=Math.random()*100+"%";
h.style.fontSize=(18+Math.random()*30)+"px";
h.style.animationDuration=(5+Math.random()*6)+"s";
h.style.animationDelay=Math.random()*5+"s";
document.body.appendChild(h);
}

/* Sparkle */
for(let i=0;i<35;i++){
let s=document.createElement("div");
s.className="spark";
s.style.left=Math.random()*100+"%";
s.style.top=Math.random()*100+"%";
s.style.animationDelay=Math.random()*3+"s";
document.body.appendChild(s);
}
</script>

</body>
</html>
