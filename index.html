<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Ahel 💖 QR Love</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700;900&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff4fa3,#ff9ccd,#ffd4ea);
overflow:hidden;
position:relative;
}

/* sparkle bg */
body::before{
content:'';
position:absolute;
inset:0;
background-image:radial-gradient(#ffffff88 1px,transparent 1px);
background-size:35px 35px;
animation:bgmove 18s linear infinite;
}

@keyframes bgmove{
from{transform:translate(0,0);}
to{transform:translate(-120px,-120px);}
}

.card{
position:relative;
z-index:5;
width:420px;
max-width:92%;
padding:35px;
border-radius:35px;
background:rgba(255,255,255,.18);
backdrop-filter:blur(20px);
box-shadow:0 25px 50px rgba(255,0,130,.25);
text-align:center;
}

h1{
font-size:48px;
font-weight:900;
color:white;
text-shadow:0 0 18px #ff0080;
}

.sub{
color:white;
margin-bottom:25px;
opacity:.9;
}

.qr-love{
width:260px;
height:260px;
margin:auto;
background:white;
padding:18px;
clip-path:path("M130 245 C20 180 -20 90 45 45 C85 15 120 35 130 65 C140 35 175 15 215 45 C280 90 240 180 130 245 Z");
display:flex;
justify-content:center;
align-items:center;
box-shadow:0 0 30px rgba(255,0,120,.35);
animation:pulse 2s infinite;
}

@keyframes pulse{
0%,100%{transform:scale(1);}
50%{transform:scale(1.03);}
}

.qr-love img{
width:150px;
height:150px;
border-radius:18px;
background:white;
padding:8px;
}

.note{
margin-top:20px;
color:white;
font-size:15px;
}

.btn{
margin-top:22px;
padding:15px 28px;
border:none;
border-radius:30px;
background:white;
color:#ff0080;
font-weight:700;
cursor:pointer;
}

.btn:hover{
transform:scale(1.05);
}

.heart{
position:absolute;
font-size:18px;
animation:fall linear infinite;
opacity:.7;
}

@keyframes fall{
0%{transform:translateY(-10vh);opacity:0;}
30%{opacity:1;}
100%{transform:translateY(110vh);opacity:0;}
}
</style>
</head>
<body>

<div class="card">
<h1>AHEL 💖</h1>
<div class="sub">Scan this love barcode</div>

<div class="qr-love">
<img src="https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=https://h4nn-rgb.github.io/for-u-ahel/" alt="QR">
</div>

<div class="note">
Scan barcode ini pakai kamera HP 📱<br>
Nanti langsung masuk ke website spesial buat Ahel 💗
</div>

<button class="btn" onclick="window.location.href='https://h4nn-rgb.github.io/for-u-ahel/'">
Open Direct 💌
</button>
</div>

<script>
for(let i=0;i<25;i++){
let h=document.createElement("div");
h.className="heart";
h.innerHTML="💖";
h.style.left=Math.random()*100+"%";
h.style.fontSize=(12+Math.random()*20)+"px";
h.style.animationDuration=(4+Math.random()*5)+"s";
h.style.animationDelay=Math.random()*5+"s";
document.body.appendChild(h);
}
</script>

</body>
</html>
