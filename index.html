<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Love ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:radial-gradient(circle,#120014,#000);
overflow:hidden;
font-family:Arial, sans-serif;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

.stars{
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
overflow:hidden;
z-index:0;
}

.star{
position:absolute;
width:2px;
height:2px;
background:white;
border-radius:50%;
animation:blink 2s infinite alternate;
}

@keyframes blink{
from{opacity:.2;}
to{opacity:1;}
}

.container{
position:relative;
z-index:2;
text-align:center;
}

h1{
font-size:55px;
margin-bottom:20px;
animation:fade 2s ease-in-out infinite alternate;
text-shadow:0 0 20px red;
}

@keyframes fade{
from{transform:scale(1);}
to{transform:scale(1.08);}
}

.circle{
width:260px;
height:260px;
border-radius:50%;
overflow:hidden;
margin:auto;
border:5px solid rgba(255,255,255,.3);
box-shadow:0 0 40px red;
animation:spin 18s linear infinite;
}

.circle img{
width:100%;
height:100%;
object-fit:cover;
}

@keyframes spin{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}

button{
margin-top:30px;
padding:15px 40px;
font-size:22px;
border:none;
border-radius:50px;
background:red;
color:white;
cursor:pointer;
box-shadow:0 0 20px red;
transition:.3s;
}

button:hover{
transform:scale(1.1);
}

.love{
position:fixed;
font-size:30px;
animation:up 4s linear forwards;
}

@keyframes up{
from{
transform:translateY(0);
opacity:1;
}
to{
transform:translateY(-800px);
opacity:0;
}
}
</style>
</head>

<body>

<div class="stars" id="stars"></div>

<div class="container">
<h1>I LOVE YOU ❤️</h1>

<div class="circle">
<img src="https://picsum.photos/500" alt="foto">
</div>

<button onclick="love()">Klik Sayang</button>

<audio autoplay loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>
</div>

<script>
for(let i=0;i<150;i++){
let s=document.createElement("div");
s.className="star";
s.style.left=Math.random()*100+"%";
s.style.top=Math.random()*100+"%";
s.style.animationDuration=(1+Math.random()*3)+"s";
document.getElementById("stars").appendChild(s);
}

function love(){
for(let i=0;i<25;i++){
let h=document.createElement("div");
h.className="love";
h.innerHTML="❤️";
h.style.left=Math.random()*100+"%";
h.style.bottom="0";
document.body.appendChild(h);

setTimeout(()=>h.remove(),4000);
}
}
</script>

</body>
</html>
